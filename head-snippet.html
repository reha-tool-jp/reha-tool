<!-- ===== PWA対応コード（全HTMLの<head>内、</head>直前に追加） ===== -->

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a5c45">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="リハツール">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/reha-tool/service-worker.js');
    });
  }
</script>

<!-- ===== ここまで ===== -->


<!-- ===== 注意事項 ===== -->
<!--
・manifest.jsonとservice-worker.jsはリポジトリのルート（index.htmlと同じ場所）に置く
・iconsフォルダを作り、icon-192.pngとicon-512.pngを用意する
  （アイコン画像は後で作成。とりあえず仮の画像でもOK）
・上記コードを以下の全ファイルのheadに追加：
  index.html / fim-tool.html / bi-tool.html / walk-tool.html /
  hdsr-tool.html / santei-tool.html / balance-tool.html / privacy.html
-->
