<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd4;
    --text: #1a1916;
    --text2: #6b6860;
    --accent: #2a5c45;
    --accent-light: #e8f2ed;
    --radius: 12px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', YuGothic, Meiryo, sans-serif;

    color: var(--text);
    max-width: 680px;

  }
  h1 { font-size: 22px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 30px; }
  p { margin: 16px 0; }
  
  .contact-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    margin-bottom: 40px;
  }
  .status-badge {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 16px;
  }
  
  .footer { text-align: center; font-size: 12px; color: var(--text3); margin-top: 40px; line-height: 2.2; }
  .footer a { color: var(--text3); text-decoration: none; }
  .footer a:hover { color: var(--accent); }
  .footer-sep { margin: 0 8px; color: #a09d96; }
  .back-link { display: inline-block; margin-top: 40px; color: var(--accent); text-decoration: none; font-size: 14px; font-weight: bold; }
