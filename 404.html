<title>ページが見つかりません | リハビリ評価・計算ツール</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd4;
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #a09d96;
    --accent: #2a5c45;
    --accent-light: #e8f2ed;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', YuGothic, Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 20px 20px 18px;
    text-align: center;
  }
  header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .container {
    max-width: 600px;
    margin: 60px auto;
    padding: 0 16px;
    text-align: center;
  }
  .error-code {
    font-size: 80px;
    font-weight: 800;
    color: var(--accent-light);
    margin-bottom: 10px;
    letter-spacing: -2px;
  }
  .error-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .error-desc {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 40px;
  }
  .action-links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 280px;
    margin: 0 auto;
  }
  .btn {
    display: inline-block;
    padding: 14px 24px;
    border-radius: var(--radius);
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    transition: opacity 0.2s, background 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-secondary:hover { background: var(--accent-light); }
  
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 60px;
    padding-bottom: 40px;
    line-height: 2.2;
  }
  .footer a { color: var(--text3); text-decoration: none; }
  .footer-sep { margin: 0 6px; }
</style>
</head>
<body>

<header>
  <h1>404 Not Found</h1>
</header>

<div class="container">

  <div class="error-title">お探しのページが見つかりませんでした。</div>
  <div class="error-desc">
    申し訳ありません。<br>
    アクセスしようとしたページは削除されたか、URLが変更された可能性があります。
  </div>

  <div class="action-links">

    <a href="/reha-tool/articles/index.html" class="btn btn-secondary">解説記事一覧を見る</a>
  </div>
</div>

</html>
